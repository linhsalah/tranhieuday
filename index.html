<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graduation Celebration</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family:'Montserrat',sans-serif;
      text-align:center;
      background: linear-gradient(135deg, #fdf6f0, #f8efe6);
      overflow-x:hidden;
    }

    .container {
      max-width:900px;
      margin:auto;
      padding:50px 20px;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-family:'Playfair Display',serif;
      font-size:48px;
      margin:10px 0;
    }

    h2 {
      font-size:22px;
      letter-spacing:4px;
      color:#9c7b5a;
    }

    img {
      width:100%;
      max-width:600px;
      border-radius:16px;
      box-shadow:0 20px 50px rgba(0,0,0,0.15);
    }

    .name {
      font-size:56px;
      margin-top:30px;
    }

    .date { font-size:36px; }

    .countdown { margin:20px 0; }

    .comments { margin-top:40px; }

    input, textarea {
      width:100%;
      padding:12px;
      margin:6px 0;
      border-radius:8px;
      border:1px solid #ddd;
    }

    button {
      padding:12px 25px;
      background:#b08968;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .comment-wrapper {
      height:250px;
      overflow:hidden;
      margin-top:20px;
      position:relative;
    }

    .comment-track {
      position:absolute;
      width:100%;
      display:flex;
      flex-direction:column;
    }

    .comment-box {
      background:white;
      padding:12px;
      margin:10px;
      border-radius:10px;
    }

    /* start screen */
    #start-screen{
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:#fdf6f0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
      cursor:pointer;
    }

    #start-screen.fade-out{
      opacity:0;
      visibility:hidden;
      transition:1s;
    }
  </style>
</head>

<body>

<div id="start-screen">
  <h2>✨ Tap to Open ✨</h2>
</div>

<audio id="bg-music" loop preload="auto">
  <source src="buong_doi_tay.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <h2>You're Invited</h2>
  <h1>Graduation Celebration</h1>

  <img src="https://i.ibb.co/vCkW4xyV/Chat-GPT-Image-Apr-6-2026-02-23-25-PM.png">

  <div class="name">Tran Hieu</div>
  <div>18 April - 07:00 AM</div>
  <div id="countdown"></div>

  <div class="comments">
    <h3>💬 Gửi lời chúc</h3>
    <input id="name" placeholder="Tên">
    <textarea id="message" placeholder="Lời chúc"></textarea>
    <button onclick="addComment()">Gửi</button>

    <div class="comment-wrapper">
      <div id="track" class="comment-track"></div>
    </div>
  </div>
</div>

<script>
// play music
const startScreen = document.getElementById('start-screen');
const music = document.getElementById('bg-music');

startScreen.addEventListener('click', () => {
  music.volume = 0.7;
  music.play().catch(()=>{});
  startScreen.classList.add('fade-out');
});

// countdown
const target = new Date("April 18, 2026 07:00:00").getTime();
setInterval(()=>{
  const now=new Date().getTime();
  const diff=target-now;
  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m=Math.floor((diff%(1000*60*60))/(1000*60));
  const s=Math.floor((diff%(1000*60))/1000);
  document.getElementById("countdown").innerHTML=`⏳ ${d} ngày ${h} giờ ${m} phút ${s} giây`;
},1000);

// comments
function addComment(){
  const name=document.getElementById("name").value;
  const msg=document.getElementById("message").value;
  if(!name||!msg)return;

  const data=JSON.parse(localStorage.getItem("comments")||"[]");
  data.push({name,msg});
  localStorage.setItem("comments",JSON.stringify(data));
  renderAll(data);
}

function renderAll(data){
  const track=document.getElementById("track");
  track.innerHTML="";
  data.forEach(c=>{
    const div=document.createElement("div");
    div.className="comment-box";
    div.innerHTML=`<b>${c.name}</b>: ${c.msg}`;
    track.appendChild(div);
  });
}

renderAll(JSON.parse(localStorage.getItem("comments")||"[]"));
</script>

</body>
</html>
