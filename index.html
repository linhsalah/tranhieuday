<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graduation Celebration</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family:'Montserrat',sans-serif;
      text-align:center;
      background: linear-gradient(135deg, #fdf6f0, #f8efe6);
      overflow-x:hidden;
    }

    .container {
      max-width:900px;
      margin:auto;
      padding:50px 20px;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-family:'Playfair Display',serif;
      font-size:48px;
      margin:10px 0;
      animation: slideDown 1s ease;
    }

    h2 {
      font-size:22px;
      letter-spacing:4px;
      color:#9c7b5a;
      animation: fadeInUp 1s ease;
    }

    img {
      width:100%;
      max-width:600px;
      border-radius:16px;
      box-shadow:0 20px 50px rgba(0,0,0,0.15);
      transition:0.5s;
    }

    img:hover {
      transform:scale(1.03);
    }

    .name {
      font-size:56px;
      margin-top:30px;
      animation: fadeInUp 1.2s ease;
    }

    .countdown { margin:20px 0; }

    .glow {
      text-shadow:0 0 10px rgba(255,215,180,0.8);
    }

    /* comments */
    .comments { margin-top:40px; }

    input, textarea {
      width:100%;
      padding:12px;
      margin:6px 0;
      border-radius:8px;
      border:1px solid #ddd;
      background:#fffaf5;
    }

    button {
      padding:12px 25px;
      background:linear-gradient(135deg,#d4a373,#b08968);
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .comment-wrapper {
      height:250px;
      overflow:hidden;
      margin-top:20px;
      position:relative;
    }

    .comment-track {
      position:absolute;
      width:100%;
      display:flex;
      flex-direction:column;
    }

    .comment-box {
      background:white;
      padding:12px;
      margin:10px;
      border-radius:10px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    @keyframes scrollLoop {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    /* animations */
    @keyframes fadeIn {
      from {opacity:0;} to {opacity:1;}
    }

    @keyframes slideDown {
      from {transform:translateY(-40px);opacity:0;}
      to {transform:translateY(0);opacity:1;}
    }

    @keyframes fadeInUp {
      from {transform:translateY(40px);opacity:0;}
      to {transform:translateY(0);opacity:1;}
    }

    /* sparkle */
    .sparkle {
      position:fixed;
      width:6px;
      height:6px;
      background:gold;
      border-radius:50%;
      animation:sparkle 3s linear infinite;
    }

    @keyframes sparkle {
      0% { transform:translateY(0); opacity:1; }
      100% { transform:translateY(100vh); opacity:0; }
    }

    /* start screen */
    #start-screen{
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:linear-gradient(135deg,#fdf6f0,#f8efe6);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
      cursor:pointer;
    }

    #start-screen.fade-out{
      animation:fadeOut 1s forwards;
    }

    @keyframes fadeOut{
      to{opacity:0;visibility:hidden;}
    }
  </style>
</head>

<body>

<div id="start-screen">
  <h2 class="glow">✨ Tap to Open Invitation ✨</h2>
</div>

<audio id="bg-music" loop preload="auto">
  <source src="buong_doi_tay.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <h2>You're Invited to</h2>
  <h1 class="glow">Graduation Celebration</h1>

  <img src="https://i.ibb.co/vCkW4xyV/Chat-GPT-Image-Apr-6-2026-02-23-25-PM.png">

  <div class="name glow">Tran Hieu</div>
  <div>18 April - 07:00 AM</div>
  <div id="countdown"></div>

  <div class="comments">
    <h3>💬 Gửi lời chúc</h3>
    <input id="name" placeholder="Tên">
    <textarea id="message" placeholder="Lời chúc"></textarea>
    <button onclick="addComment()">Gửi</button>

    <div class="comment-wrapper">
      <div id="track" class="comment-track"></div>
    </div>
  </div>
</div>

<script>
// 🎵 FIX NHẠC CHẮC CHẮN CHẠY
const startScreen = document.getElementById('start-screen');
const music = document.getElementById('bg-music');

startScreen.addEventListener('click', () => {
  music.volume = 0;
  music.muted = true;

  music.play().then(() => {
    music.muted = false;

    // fade in mượt
    let v = 0;
    const fade = setInterval(()=>{
      if(v < 0.7){
        v += 0.05;
        music.volume = v;
      } else clearInterval(fade);
    },200);

  }).catch(e => console.log(e));

  startScreen.classList.add('fade-out');
});

// countdown
const target = new Date("April 18, 2026 07:00:00").getTime();
setInterval(()=>{
  const now=new Date().getTime();
  const diff=target-now;
  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m=Math.floor((diff%(1000*60*60))/(1000*60));
  const s=Math.floor((diff%(1000*60))/1000);
  document.getElementById("countdown").innerHTML=`⏳ ${d} ngày ${h} giờ ${m} phút ${s} giây`;
},1000);

// comments
function addComment(){
  const name=document.getElementById("name").value;
  const msg=document.getElementById("message").value;
  if(!name||!msg)return;

  const data=JSON.parse(localStorage.getItem("comments")||"[]");
  data.push({name,msg});
  localStorage.setItem("comments",JSON.stringify(data));
  renderAll(data);
}

function renderAll(data){
  const track=document.getElementById("track");
  track.innerHTML="";
  data.forEach(c=>{
    const div=document.createElement("div");
    div.className="comment-box";
    div.innerHTML=`<b>${c.name}</b>: ${c.msg}`;
    track.appendChild(div);
  });
}

renderAll(JSON.parse(localStorage.getItem("comments")||"[]"));

// ✨ sparkle effect
setInterval(()=>{
  const s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"vw";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),3000);
},200);
</script>

</body>
</html>
